  {s:'Stash',lvl:4,items:[{n:'Bolts',q:40,fq:false},{n:'Plywood sheet',q:30,fq:false},{n:'Corrugated hose',q:10,fq:false},{n:'Nails',q:50,fq:false}]},
];

const fmt=n=>n>=1000000?(n/1000000).toFixed(0)+'M':n>=1000?(n/1000).toFixed(0)+'K':n;

function SectionHeader({children}){
  return <div style={{fontFamily:FONT,fontSize:11,fontWeight:700,letterSpacing:3,color:C.muted,
    borderBottom:`1px solid ${C.border}`,paddingBottom:4,marginBottom:8,textTransform:'uppercase'}}>{children}</div>;
}

function EftButton({onClick,children,active,danger}){
  const[hover,setHover]=useState(false);
  const bg=danger?(hover?'#6a1818':'#3a1010'):active?C.cyanDim:hover?'#1e2c1e':C.panel;
  const col=danger?'#e86060':active?C.cyanBr:hover?C.cyan:C.text;
  const bc=danger?'#5a2020':active?C.cyan:hover?C.borderB:C.border;
  return <div onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
    style={{fontFamily:FONT,fontSize:12,fontWeight:600,letterSpacing:1.5,padding:'4px 12px',
      cursor:'pointer',background:bg,color:col,border:`1px solid ${bc}`,userSelect:'none',
      transition:'all 0.12s',textTransform:'uppercase',whiteSpace:'nowrap',
      clipPath:'polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%)'}}>{children}</div>;
}

function ProgressBar({pct,color}){
  return <div style={{height:4,background:C.border,overflow:'hidden'}}>
    <div style={{height:'100%',width:`${pct}%`,background:color||C.cyan,transition:'width 0.4s'}}/>
  </div>;
}

function CheckRow({checked,onClick,children,dim}){
  const[hover,setHover]=useState(false);
  return <div onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
    style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',cursor:'pointer',
      background:hover?'#1c281c':checked?'#182018':'transparent',
      borderBottom:`1px solid ${C.border}44`,transition:'background 0.1s',opacity:checked?0.55:1}}>
    <div style={{width:14,height:14,flexShrink:0,border:`1px solid ${checked?C.green:C.muted}`,
      background:checked?C.green:'transparent',display:'flex',alignItems:'center',
      justifyContent:'center',color:'#fff',fontSize:9,fontWeight:'bold'}}>{checked?'✓':''}</div>
    <span style={{fontFamily:FONT,fontSize:13,color:checked?C.muted:C.textBr,
      textDecoration:checked?'line-through':'none',letterSpacing:0.3,flex:1}}>{children}</span>
    {dim&&<span style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>{dim}</span>}
  </div>;
}

function TradBadge({trader}){
  const c=TM[trader]?.c||'#888';
  return <span style={{fontFamily:FONT,fontSize:10,fontWeight:600,letterSpacing:1,padding:'1px 5px',
    background:c+'22',color:c,border:`1px solid ${c}44`,whiteSpace:'nowrap'}}>{trader}</span>;
}

function StatBox({n,l,color}){
  return <div style={{background:C.panel,border:`1px solid ${C.border}`,padding:'8px 14px',flex:1,
    minWidth:80,textAlign:'center',clipPath:'polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%)'}}>
    <div style={{color:color||C.cyan,fontSize:20,fontWeight:700,letterSpacing:1,fontFamily:FONT}}>{n}</div>
    <div style={{color:C.muted,fontSize:10,letterSpacing:1.5,marginTop:1,fontFamily:FONT}}>{l}</div>
  </div>;
}

function EFTTracker(){
  const[tab,setTab]=useState('kappa');
  const[done,setDone]=useState({});
  const[hdDone,setHdDone]=useState({});
  const[trader,setTrader]=useState('All');
  const[kappaOnly,setKappaOnly]=useState(false);
  const[station,setStation]=useState('All');
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    try{const r=localStorage.getItem('eft-done');if(r)setDone(JSON.parse(r));}catch(e){}
    try{const r=localStorage.getItem('eft-hd');if(r)setHdDone(JSON.parse(r));}catch(e){}
    setLoaded(true);
  },[]);
  useEffect(()=>{if(loaded){try{localStorage.setItem('eft-done',JSON.stringify(done));}catch(e){}}},[done,loaded]);
  useEffect(()=>{if(loaded){try{localStorage.setItem('eft-hd',JSON.stringify(hdDone));}catch(e){}}},[hdDone,loaded]);

  const toggle=id=>setDone(d=>({...d,[id]:!d[id]}));
  const toggleHd=id=>setHdDone(d=>({...d,[id]:!d[id]}));
  const resetAll=()=>{if(window.confirm('¿Resetear todo el progreso?')){setDone({});setHdDone({});}};

  const kappaQs=QUESTS.filter(q=>q.k);
  const kDone=kappaQs.filter(q=>done[q.id]).length;
  const kPct=Math.round(kDone/kappaQs.length*100);
  const traders=['All',...Object.keys(TM)];
  const visQ=QUESTS.filter(q=>(trader==='All'||q.t===trader)&&(!kappaOnly||q.k))
    .sort((a,b)=>a.lvl!==b.lvl?a.lvl-b.lvl:a.t.localeCompare(b.t));
  const stations=['All',...HIDEOUT.map(h=>h.s)];
  const visHd=station==='All'?HIDEOUT:HIDEOUT.filter(h=>h.s===station);

  return (
    <div style={{background:C.bg,minHeight:'100vh',fontFamily:FONT,color:C.text,fontSize:14}}>
      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:`2px solid ${C.border}`,padding:'0 16px',
        display:'flex',alignItems:'stretch',justifyContent:'space-between'}}>
        <div style={{padding:'10px 0'}}>
          <div style={{color:C.cyan,fontSize:18,fontWeight:700,letterSpacing:4,lineHeight:1}}>ESCAPE FROM TARKOV</div>
          <div style={{color:C.muted,fontSize:10,letterSpacing:3}}>PROGRESSION TRACKER · v1.0</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{textAlign:'right'}}>
            <div style={{color:C.muted,fontSize:10,letterSpacing:2}}>KAPPA PROGRESS</div>
            <div style={{color:C.cyan,fontSize:15,fontWeight:700,letterSpacing:1}}>{kDone}/{kappaQs.length} · {kPct}%</div>
          </div>
          <EftButton onClick={resetAll} danger>RESET</EftButton>
        </div>
      </div>
      {/* TABS */}
      <div style={{display:'flex',background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        {[['kappa','🎯  KAPPA ROADMAP'],['prestige','⭐  PRESTIGE'],['hideout','🏠  HIDEOUT']].map(([k,l])=>(
          <div key={k} onClick={()=>setTab(k)} style={{padding:'10px 20px',cursor:'pointer',fontFamily:FONT,
            fontSize:12,fontWeight:700,letterSpacing:2,userSelect:'none',color:tab===k?C.cyan:C.muted,
            borderBottom:tab===k?`2px solid ${C.cyan}`:'2px solid transparent',
            borderRight:`1px solid ${C.border}`,transition:'all 0.15s',
            background:tab===k?C.cyanDim+'33':'transparent'}}>{l}</div>
        ))}
      </div>
      {/* BODY */}
      <div style={{padding:'14px 16px',maxWidth:920,margin:'0 auto'}}>

        {/* ── KAPPA TAB ── */}
        {tab==='kappa'&&<>
          <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
            <StatBox n={kDone} l="COMPLETADAS"/>
            <StatBox n={kappaQs.length-kDone} l="PENDIENTES" color={C.text}/>
            <StatBox n={`${kPct}%`} l="PROGRESO" color={kPct===100?C.green:C.cyan}/>
            <StatBox n={QUESTS.filter(q=>!q.k&&done[q.id]).length} l="XP EXTRA" color={TM.REF.c}/>
          </div>
          <div style={{marginBottom:14,background:C.panel,border:`1px solid ${C.border}`,padding:10}}>
            <div style={{display:'flex',justifyContent:'space-between',color:C.muted,fontSize:10,letterSpacing:2,marginBottom:6}}>
              <span>RUTA GLOBAL AL KAPPA</span><span style={{color:C.cyan}}>{kPct}%</span>
            </div>
            <ProgressBar pct={kPct}/>
            <div style={{display:'flex',flexWrap:'wrap',gap:'4px 0',marginTop:10}}>
              {Object.entries(TM).map(([tr,{c}])=>{
                const tq=QUESTS.filter(q=>q.t===tr&&q.k);
                const td=tq.filter(q=>done[q.id]).length;
                const pct=tq.length?Math.round(td/tq.length*100):100;
                return <div key={tr} style={{display:'flex',alignItems:'center',gap:8,width:'50%',padding:'2px 0'}}>
                  <span style={{fontFamily:FONT,fontSize:10,fontWeight:600,letterSpacing:1,padding:'1px 5px',
                    background:c+'22',color:c,border:`1px solid ${c}44`,width:90,textAlign:'center'}}>{tr}</span>
                  <div style={{flex:1,height:3,background:C.border,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:c,transition:'width 0.3s'}}/>
                  </div>
                  <span style={{color:C.muted,fontSize:10,minWidth:40,textAlign:'right'}}>{td}/{tq.length}</span>
                </div>;
              })}
            </div>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{color:C.muted,fontSize:10,letterSpacing:2}}>TRADER:</span>
            {traders.map(t=><EftButton key={t} active={trader===t} onClick={()=>setTrader(t)}>{t}</EftButton>)}
          </div>
          <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
            <EftButton active={kappaOnly} onClick={()=>setKappaOnly(x=>!x)}>{kappaOnly?'✓ Solo Kappa':'Solo Kappa'}</EftButton>
            <span style={{color:C.muted,fontSize:10,letterSpacing:1,marginLeft:4}}>{visQ.length} MISIONES</span>
          </div>
          {visQ.map(q=>(
            <CheckRow key={q.id} checked={!!done[q.id]} onClick={()=>toggle(q.id)}
              dim={<>
                {q.note&&<span style={{color:'#6a8a50',fontSize:10}}>{q.note}</span>}
                {q.k&&<span style={{fontFamily:FONT,fontSize:10,fontWeight:600,letterSpacing:1,
                  padding:'1px 5px',background:C.goldDim,color:C.gold,border:`1px solid ${C.goldDim}`}}>KAPPA</span>}
                <TradBadge trader={q.t}/>
                <span style={{fontFamily:FONT,fontSize:10,fontWeight:600,letterSpacing:1,
                  padding:'1px 5px',background:C.cyanDim,color:C.cyan,border:`1px solid ${C.cyanDim}`}}>LV{q.lvl}</span>
              </>}>{q.n}</CheckRow>
          ))}
          <div style={{color:C.muted,fontSize:10,padding:'7px 10px',background:C.panel,
            border:`1px solid ${C.border}`,marginTop:12,letterSpacing:0.5,lineHeight:1.6}}>
            ⚠ DATOS APROXIMADOS — EFT SE ACTUALIZA FRECUENTEMENTE. VERIFICÁ EN EL WIKI OFICIAL ANTE DISCREPANCIAS.
          </div>
        </>}

        {/* ── PRESTIGE TAB ── */}
        {tab==='prestige'&&<>
          <div style={{color:C.muted,fontSize:10,padding:'7px 10px',background:C.panel,
            border:`1px solid ${C.cyan}44`,marginBottom:14,letterSpacing:0.5,lineHeight:1.6,
            borderLeft:`3px solid ${C.cyan}`}}>
            ℹ️ DATOS EXTRAÍDOS DIRECTAMENTE DEL JUEGO. P5 Y P6 COMPARTEN NIVEL/SKILLS PERO DIFIEREN EN MISIONES.
          </div>
          {PRESTIGES.map(p=>{
            const dr=p.tasks.filter((_,i)=>done[`pr_${p.num}_t${i}`]).length
              +p.skills.filter((_,i)=>done[`pr_${p.num}_s${i}`]).length
              +p.hideout.filter((_,i)=>done[`pr_${p.num}_h${i}`]).length
              +(done[`pr_${p.num}_lvl`]?1:0)+(done[`pr_${p.num}_rou`]?1:0);
            const total=1+p.tasks.length+p.skills.length+p.hideout.length+1;
            const pct=Math.round(dr/total*100);
            return <div key={p.num} style={{display:'flex',gap:0,marginBottom:12,
              border:`1px solid ${p.color}44`,borderLeft:`3px solid ${p.color}`,background:C.card,
              overflow:'hidden',clipPath:'polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%)'}}>
              <div style={{flex:'0 0 270px',background:C.panel,borderRight:`1px solid ${C.border}`,padding:12}}>
                <SectionHeader>UNLOCK CONDITIONS</SectionHeader>
                <div style={{marginBottom:8}}>
                  <div style={{color:C.muted,fontSize:10,letterSpacing:2,marginBottom:4}}>CHARACTER LEVEL</div>
                  <CheckRow checked={!!done[`pr_${p.num}_lvl`]}
                    onClick={()=>setDone(d=>({...d,[`pr_${p.num}_lvl`]:!d[`pr_${p.num}_lvl`]}))}>
                    <span style={{color:p.color,fontWeight:700}}>Level {p.level}</span>
                  </CheckRow>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{color:C.muted,fontSize:10,letterSpacing:2,marginBottom:4}}>TASKS</div>
                  {p.tasks.map((t,i)=><CheckRow key={i} checked={!!done[`pr_${p.num}_t${i}`]}
                    onClick={()=>setDone(d=>({...d,[`pr_${p.num}_t${i}`]:!d[`pr_${p.num}_t${i}`]}))}>
                    <span style={{color:p.color,fontWeight:600}}>{t}</span>
                  </CheckRow>)}
                </div>
                {p.skills.length>0&&<div style={{marginBottom:8}}>
                  <div style={{color:C.muted,fontSize:10,letterSpacing:2,marginBottom:4}}>SKILLS</div>
                  {p.skills.map((sk,i)=><CheckRow key={i} checked={!!done[`pr_${p.num}_s${i}`]}
                    onClick={()=>setDone(d=>({...d,[`pr_${p.num}_s${i}`]:!d[`pr_${p.num}_s${i}`]}))}>
                    <span style={{color:p.color,fontWeight:600}}>{sk.n}</span>
                    <span style={{color:C.muted,fontSize:11,marginLeft:'auto',marginRight:4}}>·····</span>
                    <span style={{color:p.color,fontWeight:700}}>{sk.v}/{sk.v}</span>
                  </CheckRow>)}
                </div>}
                <div style={{marginBottom:8}}>
                  <div style={{color:C.muted,fontSize:10,letterSpacing:2,marginBottom:4}}>HIDEOUT UPGRADES</div>
                  {p.hideout.map((h,i)=><CheckRow key={i} checked={!!done[`pr_${p.num}_h${i}`]}
                    onClick={()=>setDone(d=>({...d,[`pr_${p.num}_h${i}`]:!d[`pr_${p.num}_h${i}`]}))}>
                    <span style={{color:p.color,fontWeight:600}}>{h}</span>
                  </CheckRow>)}
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{color:C.muted,fontSize:10,letterSpacing:2,marginBottom:4}}>OBTAIN ITEMS</div>
                  <CheckRow checked={!!done[`pr_${p.num}_rou`]}
                    onClick={()=>setDone(d=>({...d,[`pr_${p.num}_rou`]:!d[`pr_${p.num}_rou`]}))}>
                    <span style={{color:C.muted,fontWeight:600}}>Roubles</span>
                    <span style={{color:p.color,fontWeight:700,marginLeft:'auto'}}>{fmt(p.roubles)}</span>
                  </CheckRow>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',color:C.muted,fontSize:9,letterSpacing:2,marginBottom:3}}>
                  <span>PROGRESS</span><span style={{color:p.color}}>{dr}/{total}</span>
                </div>
                <ProgressBar pct={pct} color={p.color}/>
                {pct===100&&<div style={{color:C.green,fontSize:10,letterSpacing:2,marginTop:4,fontWeight:700}}>✓ CONDITIONS MET</div>}
              </div>
              <div style={{flex:1,padding:12}}>
                <div style={{fontFamily:FONT,fontSize:13,fontWeight:700,letterSpacing:3,color:p.color,
                  marginBottom:10,borderBottom:`1px solid ${p.color}33`,paddingBottom:6}}>
                  {'★'.repeat(p.num)} PRESTIGE {p.num} — REWARDS
                </div>
                {p.rewards.map((r,i)=><div key={i} style={{background:C.panel,border:`1px solid ${p.color}33`,
                  padding:'4px 8px',fontSize:11,fontFamily:FONT,color:C.textBr,letterSpacing:0.3,
                  marginBottom:3,borderLeft:`2px solid ${p.color}66`}}>{r}</div>)}
              </div>
            </div>;
          })}
        </>}

        {/* ── HIDEOUT TAB ── */}
        {tab==='hideout'&&<>
          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
            <StatBox n={HIDEOUT.reduce((a,h)=>a+h.items.length,0)} l="ITEMS TOTALES"/>
            <StatBox n={HIDEOUT.reduce((a,h)=>a+h.items.filter(it=>hdDone[`${h.s}_${it.n}`]).length,0)} l="FARMADOS" color={C.green}/>
            <StatBox n={HIDEOUT.reduce((a,h)=>a+h.items.filter(it=>it.fq).length,0)} l="DE MISIONES" color={C.gold}/>
          </div>
          <div style={{display:'flex',gap:5,marginBottom:12,flexWrap:'wrap'}}>
            {stations.map(st=><EftButton key={st} active={station===st} onClick={()=>setStation(st)}>{st==='All'?'TODAS':st}</EftButton>)}
          </div>
          {visHd.map(h=>{
            const dn=h.items.filter(it=>hdDone[`${h.s}_${it.n}`]).length;
            const pct=Math.round(dn/h.items.length*100);
            return <div key={h.s} style={{background:C.card,border:`1px solid ${C.border}`,marginBottom:8,
              clipPath:'polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)'}}>
              <div style={{background:C.panel,padding:'7px 12px',display:'flex',alignItems:'center',
                justifyContent:'space-between',borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontFamily:FONT,color:C.cyan,fontWeight:700,fontSize:13,letterSpacing:2}}>{h.s.toUpperCase()}</span>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{color:C.muted,fontSize:10,letterSpacing:1}}>L{h.lvl} MAX</span>
                  <span style={{color:C.cyan,fontSize:11,fontWeight:700}}>{dn}/{h.items.length}</span>
                  <div style={{width:60,height:3,background:C.border,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:C.cyan}}/>
                  </div>
                </div>
              </div>
              {h.items.map(it=>{
                const k=`${h.s}_${it.n}`;const ch=!!hdDone[k];
                return <div key={it.n} onClick={()=>toggleHd(k)}
                  style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',
                    borderBottom:`1px solid ${C.border}33`,background:ch?'#182418':'transparent',
                    cursor:'pointer',opacity:ch?0.55:1,transition:'all 0.1s'}}>
                  <div style={{width:14,height:14,flexShrink:0,border:`1px solid ${ch?C.green:C.muted}`,
                    background:ch?C.green:'transparent',display:'flex',alignItems:'center',
                    justifyContent:'center',color:'#fff',fontSize:9,fontWeight:'bold'}}>{ch?'✓':''}</div>
                  <span style={{flex:1,fontFamily:FONT,fontSize:13,letterSpacing:0.3,
                    color:ch?C.muted:C.textBr,textDecoration:ch?'line-through':'none'}}>{it.n}</span>
                  <span style={{color:C.cyan,fontSize:13,fontWeight:700,minWidth:28,textAlign:'right'}}>×{it.q}</span>
                  {it.fq&&<span style={{fontFamily:FONT,fontSize:10,fontWeight:600,letterSpacing:1,
                    padding:'1px 5px',background:C.goldDim,color:C.gold,border:`1px solid ${C.goldDim}`}}>
                    🎯 {it.qn}
                  </span>}
                </div>;
              })}
            </div>;
          })}
          <div style={{color:C.muted,fontSize:10,padding:'7px 10px',background:C.panel,
            border:`1px solid ${C.border}`,marginTop:4,letterSpacing:0.5,lineHeight:1.6}}>
            ⚠ CANTIDADES APROXIMADAS PARA NIVEL MÁXIMO DESDE CERO. ITEMS CON 🎯 SE OBTIENEN COMO RECOMPENSA DE MISIONES.
          </div>
        </>}

      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<EFTTracker/>);
</script>
</body>
</html>
